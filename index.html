<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./styles.css">
    <title>Calculator</title>
</head>
<body>
    <div class="container">
        <div class="calculator">
            <div class="user-input">0</div>
            <div class="clear-delete-btns">
                <button class="clear-btn">
                    CLEAR
                </button>
                <button class="delete-btn">
                    DELETE
                </button>
            </div>
            <div class="calculator__panel">
                <div class="calculator__numbers">
                    <div class="row">
                        <button class="calculator-btn">
                            7                    
                        </button>
                        <button class="calculator-btn">
                            8
                        </button>
                        <button class="calculator-btn">
                            9
                        </button>
                    </div>
                    <div class="row">
                        <button class="calculator-btn">
                            4                    
                        </button>
                        <button class="calculator-btn">
                            5
                        </button>
                        <button class="calculator-btn">
                            6
                        </button>
                    </div>
                    <div class="row">
                        <button class="calculator-btn">
                            1                    
                        </button>
                        <button class="calculator-btn">
                            2
                        </button>
                        <button class="calculator-btn">
                            3
                        </button>
                    </div>
                    <div class="row">
                        <button class="calculator-btn dot-btn">
                            .                    
                        </button>
                        <button class="calculator-btn">
                            0
                        </button>
                        <button class="equal-btn">
                            =
                        </button>
                    </div>
                </div>
    
                <div class="calculator-operations">
                        <button class="operation-btn divide" data-operation="divide">
                            ÷                    
                        </button>
                        <button class="operation-btn multiply" data-operation="multiply">
                            x
                        </button>
                        <button class="operation-btn subtract" data-operation="subtract">
                            -
                        </button>
                        <button class="operation-btn add" data-operation="add">
                            +
                        </button>
                </div>
            </div>
            
            

        </div>
    </div>
<script src="./index.js"></script>
</body>
</html>
